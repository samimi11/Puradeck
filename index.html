  --color-text-secondary: #38484f;
  --color-text-muted: #5c6670;
  --color-accent-1: #2d6a4f;
  --color-accent-2: #52b788;
  --color-accent-3: #c9974a;
  --color-glass-bg: rgba(255,255,255,0.88);
  --color-glass-border: rgba(0,0,0,0.07);
  --color-vignette: rgba(0,0,0,0.04);
  --font-display: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;

<style>
:root {
  --bg:      #ffffff;
  --surface: #ffffff;
  --bg-deep: #f5f5f0;
  --line:    #e4e0d8;
  --ink:     #0d1b12;
  --text:    #253329;
  --muted:   #566d61;
  --green:   #1B4332;
  --green2:  #2D6A4F;
  --green3:  #52B788;
  --amber:   #92540a;
  --amber2:  #c9974a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #ffffff;
  color: var(--text);
  font-family: Inter, system-ui, sans-serif;
  overflow: hidden;
}

.deck {
  position: relative;
  width: 100vw; height: 100vh;
  background: #ffffff;
}

.slide {
  position: absolute; inset: 0;
  background: #ffffff;
  padding: 36px 52px 60px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(.990);
  transition: opacity .42s ease, transform .42s ease;
  pointer-events: none;
  overflow: hidden;
}
.slide.active { opacity: 1; transform: scale(1); pointer-events: auto; }

/* Last slide — forced white, triple-locked */
.slide-12 {
  background: #ffffff !important;
  background-color: #ffffff !important;
}

.content {
  width: 100%; max-width: 1160px;
  display: flex; flex-direction: column; justify-content: center;
}

/* Eyebrow — tiny 10.5px label, green is fine at this size */
.eyebrow {
  font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--green2); font-weight: 700; margin-bottom: 10px;
  font-family: Inter, sans-serif;
}

/* ALL headings: near-black --ink, never green */
h1, h2, h3 {
  font-family: "Cormorant", Georgia, serif;
  color: var(--ink);
}
h1 { font-size: 48px; line-height: 1.06; font-weight: 700; }
h2 { font-size: 32px; line-height: 1.14; font-weight: 700; margin-bottom: 14px; }
h3 { font-size: 17px; line-height: 1.3; font-weight: 600; margin-bottom: 4px; }

p   { color: var(--text); line-height: 1.55; font-size: 14px; }
.sub { font-size: 17px; color: var(--text); max-width: 800px; line-height: 1.5; }

/* Metric numbers — --ink (near-black) always, NEVER green */
.metric {
  font-size: 28px; font-weight: 800;
  color: var(--ink);
  margin-bottom: 5px;
  font-family: Inter, sans-serif;
  letter-spacing: -.02em;
  line-height: 1.1;
}

/* Cards */
.card {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 20px;
  box-shadow: 0 2px 12px rgba(13,27,18,.06), 0 1px 3px rgba(13,27,18,.04);
  transition: transform .18s, box-shadow .18s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(13,27,18,.09);
}

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }

.small { font-size: 12px; color: var(--muted); }

.badge {
  padding: 6px 12px; border-radius: 999px;
  background: #f4f4f0; border: 1px solid var(--line);
  font-size: 12.5px; color: var(--ink); font-weight: 500;
  display: inline-block;
}
.badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

/* Logo pill */
.logo-pill {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 9px 15px; background: #fff;
  border: 1px solid var(--line); border-radius: 999px;
  box-shadow: 0 3px 14px rgba(13,27,18,.07);
}
.logo-mark {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--green), var(--green3));
  display: grid; place-items: center;
  color: #fff; font-weight: 800; font-size: 17px;
  font-family: "Cormorant", serif; font-style: italic;
}

ul.clean {
  margin: 8px 0 0 16px;
  color: var(--text);
  font-size: 13.5px; line-height: 1.55;
}
ul.clean li { margin: 5px 0; }

/* Icon box: green bg is decorative — never used for readable text */
.iconbox {
  width: 38px; height: 38px; border-radius: 10px;
  background: #e9f5ee;
  display: grid; place-items: center;
  color: var(--green); font-weight: 800; font-size: 14px;
  margin-bottom: 10px;
  font-family: Inter, sans-serif;
}

/* Bar charts */
.bar-wrap {
  display: grid;
  grid-template-columns: 155px 1fr 170px;
  gap: 10px; align-items: center; margin: 8px 0;
}
.bar-label { font-size: 13px; font-weight: 500; color: var(--text); }
.track { height: 11px; border-radius: 999px; background: #eceae5; overflow: hidden; }
.fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--green), var(--green3));
  width: 0; transition: width .75s cubic-bezier(.4,0,.2,1);
}
.fill.cons { background: linear-gradient(90deg, var(--amber), var(--amber2)); }
/* bar-val uses --ink: dark, fully legible */
.bar-val { font-size: 13px; font-weight: 600; color: var(--ink); }

/* Note boxes */
.note {
  padding: 13px 17px;
  background: #f0faf4;
  border-left: 4px solid var(--green3);
  border-radius: 10px;
  color: var(--text);
  font-size: 13.5px; line-height: 1.55;
}
.note.amber {
  background: #fdf4e7;
  border-left-color: var(--amber2);
  color: var(--text);
}

/* Competitive landscape chart */
.landscape {
  position: relative; height: 340px;
  border-radius: 18px; border: 1px solid var(--line);
  background: #fafaf7;
  box-shadow: 0 4px 18px rgba(13,27,18,.05);
}
.axis-line { position: absolute; background: #d4d0c8; }
.axis-x { height: 1.5px; left: 58px; right: 24px; top: 50%; }
.axis-y { width: 1.5px; top: 18px; bottom: 46px; left: 58px; }
.axis-label {
  position: absolute; font-size: 11px;
  color: var(--muted); font-weight: 600; white-space: nowrap;
  font-family: Inter, sans-serif;
}
.cmp-dot {
  position: absolute; transform: translate(-50%,-50%);
  padding: 7px 12px; border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  background: #fff; border: 1px solid #d0ccc4;
  box-shadow: 0 3px 10px rgba(0,0,0,.06);
  white-space: nowrap; cursor: default; color: var(--ink);
}
.cmp-dot.pura {
  background: linear-gradient(135deg, var(--green), var(--green2));
  color: #fff; border: none; font-size: 12px; font-weight: 700;
  box-shadow: 0 6px 18px rgba(27,67,50,.30);
}
.qlabel {
  position: absolute; font-size: 10.5px;
  color: var(--green2); letter-spacing: .06em;
  font-weight: 700; font-family: Inter, sans-serif;
}

/* Team cards */
.team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.person-card { display: grid; grid-template-columns: 76px 1fr; gap: 14px; align-items: start; }
.avatar {
  width: 76px; height: 76px; border-radius: 14px;
  border: 1px solid var(--line); background: #e9f5ee;
  display: grid; place-items: center; font-size: 30px;
}
/* title-lite: green at 10px inside cards — decorative label only */
.title-lite {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .2em; color: var(--green2);
  font-weight: 700; margin-bottom: 5px;
  font-family: Inter, sans-serif;
}

/* Footer strip */
.footerline {
  position: absolute; bottom: 16px; left: 52px; right: 52px;
  display: flex; justify-content: space-between;
  font-size: 10.5px; color: #94a0a8;
  border-top: 1px solid var(--line); padding-top: 8px;
}

/* Navigation pill */
.nav {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 7px; align-items: center;
  padding: 8px 16px;
  background: rgba(255,255,255,.97);
  border: 1px solid var(--line); border-radius: 999px;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,.10);
  z-index: 100;
}
.nbtn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--line); background: #fff;
  color: var(--ink);
  font-weight: 700; cursor: pointer; font-size: 16px; line-height: 1;
  display: grid; place-items: center;
}
.nbtn:hover { background: var(--bg-deep); }
.dotnav {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ccd4ce; cursor: pointer;
  transition: background .2s, transform .2s;
}
.dotnav.active { background: var(--green2); transform: scale(1.35); }
.cnt { font-size: 11px; color: var(--muted); min-width: 34px; text-align: center; }

.reveal { opacity: 0; transform: translateY(8px); }

/* Layout helpers */
.hero-layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 30px; align-items: center; }
.stat-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Divider */
.hdiv { border: none; border-top: 1px solid var(--line); margin: 12px 0; }

/* Accent line above headings */
.accent-line {
  width: 36px; height: 3px; border-radius: 3px;
  background: linear-gradient(90deg, var(--green), var(--green3));
  margin-bottom: 12px;
}

<script>
let current=1;
const total=document.querySelectorAll('.slide').length;
const dotsC=document.getElementById('dots');
const counter=document.getElementById('counter');
for(let i=1;i<=total;i++){const d=document.createElement('div');d.className='dot'+(i===1?' active':'');d.onclick=()=>goToSlide(i);dotsC.appendChild(d);}
function goToSlide(n){
  const prev=document.querySelector('.slide.active');
  const next=document.querySelector(`.slide[data-slide="${n}"]`);
  if(prev)prev.classList.remove('active');
  if(next){next.classList.add('active');animateSlide(next);}
  current=n;updateNav();
}
function changeSlide(dir){let n=current+dir;if(n<1)n=total;if(n>total)n=1;goToSlide(n);}
function updateNav(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i+1===current));counter.textContent=current+' / '+total;}
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();changeSlide(1);}if(e.key==='ArrowLeft'){e.preventDefault();changeSlide(-1);}});
let touchX=0;
document.addEventListener('touchstart',(e)=>{touchX=e.touches[0].clientX;});
document.addEventListener('touchend',(e)=>{const d=touchX-e.changedTouches[0].clientX;if(Math.abs(d)>50)changeSlide(d>0?1:-1);});
function animateSlide(slide){
  slide.querySelectorAll('.reveal').forEach((el,i)=>{
    el.style.transition='none';el.style.opacity='0';el.style.transform='translateY(18px)';
    el.offsetHeight;
    const delay=i*0.07;
    el.style.transition=`opacity 0.35s ease ${delay}s,transform 0.35s ease ${delay}s`;
    el.style.opacity='1';el.style.transform='translateY(0)';
  });
  animateEffects(slide);
}
function animateEffects(slide){
  slide.querySelectorAll('[data-count]:not(.counted)').forEach(el=>{
    el.classList.add('counted');
    const target=parseInt(el.dataset.count),suf=el.dataset.suffix||'',pre=el.dataset.prefix||'';
    let cur=0;const step=target/40;
    const t=setInterval(()=>{cur+=step;if(cur>=target){cur=target;clearInterval(t);}el.textContent=pre+Math.round(cur).toLocaleString()+suf;},30);
  });
  slide.querySelectorAll('.bar-fill[data-width]:not(.fill-init)').forEach((bar,i)=>{
    bar.classList.add('fill-init');
    bar.style.width='0%';bar.style.transition=`width 0.7s ease ${i*0.1}s`;
    bar.offsetHeight;bar.style.width=bar.dataset.width+'%';
  });
}
document.addEventListener('mousemove',(e)=>{
  const s=document.querySelector('.mouse-spotlight');
  if(s)s.style.background=`radial-gradient(600px circle at ${e.clientX}px ${e.clientY}px,rgba(82,183,136,0.055),transparent 40%)`;
});
window.initParticles=function(canvas,opts){
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  const cnt=opts.count||55;const inter=opts.interactive!==false;
  let mx=-1000,my=-1000;
  const pts=Array.from({length:cnt},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,size:Math.random()*2+0.8,alpha:Math.random()*0.3+0.1}));
  if(inter){canvas.addEventListener('mousemove',(e)=>{const r=canvas.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;});canvas.addEventListener('mouseleave',()=>{mx=-1000;my=-1000;});}
  (function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{
      if(inter){const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<120){const f=(120-d)/120*2;p.vx+=(dx/d)*f*0.1;p.vy+=(dy/d)*f*0.1;}}
      p.vx*=0.98;p.vy*=0.98;p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
      if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(82,183,136,${p.alpha})`;ctx.fill();
    });
    requestAnimationFrame(tick);
  })();
};
document.querySelectorAll('.particle-canvas').forEach(c=>window.initParticles(c,{interactive:true,count:55}));
try{animateSlide(document.querySelector('.slide.active'));}catch(e){}
</script>
